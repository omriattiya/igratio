<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="32" height="32">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="1" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="1" />
    </radialGradient>

    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="100" ry="100" fill="url(#bg-glow)" />

  <g transform="translate(0, -20)">
    <g opacity="0.3" filter="url(#glow)">
      <line x1="180" y1="320" x2="320" y2="160" stroke="url(#logo-grad)" stroke-width="24" stroke-linecap="round" />
      <path d="M 185 240 L 185 190 M 150 200 L 185 160 L 220 200" stroke="url(#logo-grad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <line x1="160" y1="240" x2="210" y2="240" stroke="url(#logo-grad)" stroke-width="16" stroke-linecap="round" />
      <path d="M 315 240 L 315 290 M 280 280 L 315 320 L 350 280" stroke="url(#logo-grad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <line x1="290" y1="240" x2="340" y2="240" stroke="url(#logo-grad)" stroke-width="16" stroke-linecap="round" />
    </g>

    <g>
      <line x1="180" y1="320" x2="320" y2="160" stroke="url(#logo-grad)" stroke-width="20" stroke-linecap="round" />
      <path d="M 185 240 L 185 185" stroke="url(#logo-grad)" stroke-width="18" stroke-linecap="round" fill="none" />
      <path d="M 150 200 L 185 165 L 220 200" stroke="url(#logo-grad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <line x1="155" y1="240" x2="215" y2="240" stroke="url(#logo-grad)" stroke-width="16" stroke-linecap="round" />
      <path d="M 315 240 L 315 295" stroke="url(#logo-grad)" stroke-width="18" stroke-linecap="round" fill="none" />
      <path d="M 280 280 L 315 315 L 350 280" stroke="url(#logo-grad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <line x1="285" y1="240" x2="345" y2="240" stroke="url(#logo-grad)" stroke-width="16" stroke-linecap="round" />
    </g>
  </g>
</svg>
